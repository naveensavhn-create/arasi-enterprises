name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Unit tests & coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun run test:coverage -- --reporter=default --reporter=junit --outputFile=./test-report.junit.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn

      - name: Upload JUnit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: test-report.junit.xml
          if-no-files-found: warn

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "const c=require('./coverage/coverage-summary.json').total;console.log('| Metric | % | Covered / Total |\n|---|---|---|');for(const k of ['lines','statements','functions','branches']){const m=c[k];console.log('| '+k+' | '+m.pct+'% | '+m.covered+' / '+m.total+' |')}" >> $GITHUB_STEP_SUMMARY
          else
            echo "No coverage summary found." >> $GITHUB_STEP_SUMMARY
          fi
